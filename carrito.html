<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Producto</title>
</head>
<body>

<h1>Agregar Producto</h1>

    <form id="formProducto">
        <label>Nombre del producto:</label><br>
        <input type="text" id="title" required><br><br>
        <label>Precio:</label><br>
        <input type="number" id="price" step="0.01" required><br><br>
        <label>Descripción:</label><br>
        <textarea id="description" required></textarea><br><br>
    <label>URL de imagen:</label><br>
    <input type="text" id="image"><br><br>

    <label>Categoría:</label><br>
        <select id="category">
            <option value="electronics">Electrónica</option>
            <option value="jewelery">Joyería</option>
            <option value="men's clothing">Ropa Hombre</option>
            <option value="women's clothing">Ropa Mujer</option>
        </select><br><br>
        <button type="submit">Agregar Producto</button>
    </form>

<script>
    const form = document.getElementById('formProducto');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

    const producto = {
        title: document.getElementById('title').value,
        price: parseFloat(document.getElementById('price').value),
        description: document.getElementById('description').value,
        image: document.getElementById('image').value,
        category: document.getElementById('category').value
    };
        try {
        const res = await fetch('https://fakestoreapi.com/products', {
            method: 'POST',
            headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(producto)
        });
        const data = await res.json();
        console.log('Producto agregado:', data);
        alert('Producto agregado con ID: ' + data.id);
    } catch (error) {
        console.error(error);
    }
    });
</script>

</body>
</html>
